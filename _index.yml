indexpage:
  title: Documentation sur la NetApp Ransomware Resilience
  summary: NetApp Ransomware Resilience protège, détecte et prend en charge la restauration
    des charges de travail menacées par des ransomwares, aussi bien sur site que dans
    le stockage cloud. Ransomware Resilience permet une sauvegarde et une restauration
    sécurisées, aidant ainsi les entreprises à protéger les données stratégiques et
    à assurer la continuité de leurs activités pour Oracle, les datastores de VM,
    le stockage NAS, et plus encore.
